<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>April '26 — Literature (very liberally)</title>
<style>
:root { --sel:#a7d8ff; --hl:#c8e6ff; --ok:#b8deb8; --bad:#f5c0c0; --rev:#888; --cs:40px; }
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#f7f7f7; font-family:Georgia,serif; min-height:100vh; display:flex; flex-direction:column; }
header { background:#000; color:#fff; padding:10px 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
header h1 { font-size:1.3rem; }
header small { font-size:.7rem; color:#aaa; font-style:italic; display:block; }
.toolbar { display:flex; gap:5px; flex-wrap:wrap; }
.toolbar button { background:transparent; border:1px solid #555; color:#ddd; padding:4px 9px; font-size:.7rem; cursor:pointer; border-radius:3px; }
.toolbar button:hover { background:#333; color:#fff; }
.toolbar button.on { background:#555; color:#fff; }
#banner { background:#111; color:#fff; padding:7px 16px; font-size:.85rem; min-height:34px; line-height:1.4; }
#banner strong { font-family:Arial,sans-serif; margin-right:4px; }
.main { display:flex; flex:1; gap:22px; max-width:1100px; margin:0 auto; width:100%; padding:16px; align-items:flex-start; }
.grid-wrap { flex-shrink:0; }
#grid { display:inline-grid; grid-template-columns:repeat(15,var(--cs)); grid-template-rows:repeat(15,var(--cs)); gap:1px; background:#000; border:2px solid #000; }
.cell { width:var(--cs); height:var(--cs); background:#fff; position:relative; display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none; }
.cell.blk { background:#000; cursor:default; }
.cell.hl  { background:var(--hl); }
.cell.sel { background:var(--sel); }
.cell.ok  { background:var(--ok); }
.cell.bad { background:var(--bad); }
.cn { position:absolute; top:2px; left:2px; font-size:8px; font-family:Arial,sans-serif; color:#000; pointer-events:none; line-height:1; }
.cl { font-size:19px; font-family:'Franklin Gothic Medium','Arial Narrow',Arial,sans-serif; font-weight:700; color:#000; text-transform:uppercase; pointer-events:none; line-height:1; }
.cell.pencil .cl { color:#777; font-weight:400; }
.cell.rev .cl { color:var(--rev); }
.clues { flex:1; display:flex; gap:14px; min-width:0; }
.clist { flex:1; min-width:0; }
.clist h2 { font-family:Arial,sans-serif; font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; border-bottom:2px solid #000; padding-bottom:4px; margin-bottom:6px; }
.citems { display:flex; flex-direction:column; max-height:650px; overflow-y:auto; padding-right:4px; }
.citems::-webkit-scrollbar { width:3px; }
.citems::-webkit-scrollbar-thumb { background:#ccc; }
.ci { display:flex; gap:6px; padding:3px 5px; font-size:.8rem; line-height:1.35; cursor:pointer; border-radius:2px; }
.ci:hover { background:#e8e8e8; }
.ci.active { background:var(--sel); }
.ci .n { font-family:Arial,sans-serif; font-weight:700; min-width:26px; text-align:right; flex-shrink:0; font-size:.78rem; padding-top:1px; }
.statusbar { background:#222; color:#bbb; padding:5px 20px; font-size:.7rem; font-family:Arial,sans-serif; display:flex; gap:18px; }
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:99; align-items:center; justify-content:center; }
.modal-bg.on { display:flex; }
.modal { background:#fff; padding:28px 36px; border:3px solid #000; max-width:380px; width:90%; text-align:center; }
.modal h2 { font-size:1.4rem; margin-bottom:10px; }
.modal p { font-size:.88rem; color:#444; margin-bottom:18px; line-height:1.6; }
.modal button { background:#000; color:#fff; border:none; padding:9px 24px; font-family:Arial,sans-serif; font-size:.82rem; cursor:pointer; }
@media (max-width:820px) {
  :root { --cs:26px; }
  .main { flex-direction:column; padding:8px; gap:12px; }
  .citems { max-height:240px; }
  .cl { font-size:13px; }
  .cn { font-size:6px; }
}
</style>

<script>
var CLUES = {

    {n:10, a:'LAMP',          c:'A Redditor might think it looks weird'},
    {n:14, a:'POORTASTE',     c:"What connoisseurs don't have, by definition (4, 5)"},

    {n:49, a:'YSTD',       c:"A diarist's shorthand for the day before"},
    {n:51, a:'ADD',        c:'Contribute'}
  ]
};

var NR=15, NC=15;

// Black cells specified by user (1-indexed row,col) converted to 0-indexed
var BLACK = new Set([
  '0,10','1,9','2,9','2,13','3,7','3,8',
  '4,0','4,1','4,2','4,3','4,12','4,13',
  '5,6','6,5','6,13','7,4','7,8','7,9','7,10','7,12','7,13',
  '8,4','8,9','9,3','9,12','9,13',
  '10,0','10,1','10,2','10,8','10,11','10,13','10,14',
  '11,4','11,5','11,6','11,7','11,8',
  '12,0','12,4','12,5',
  '13,0','13,4','13,5','13,7','13,8','13,10',
  '14,0'
]);

function isBlack(r,c){ return BLACK.has(r+','+c) || r<0 || r>=NR || c<0 || c>=NC; }

// Build solution grid — '.' for white, '#' for black, then overwrite with letters
var sol=[];
var r,c,i;
for(r=0;r<NR;r++){
  sol.push([]);
  for(c=0;c<NC;c++) sol[r].push(isBlack(r,c)?'#':'.');
}

function pa(row,col,w){ for(i=0;i<w.length;i++) sol[row][col+i]=w[i]; }
function pd(row,col,w){ for(i=0;i<w.length;i++) sol[row+i][col]=w[i]; }

// ACROSS — positions from verified auto-numbering (0-indexed row, col):
// 1A  row0  col0  len10
// 10A row0  col11 len4
// 14A row1  col0  len9
// 15A row1  col10 len5
// 16A row2  col0  len9

// 18A row3  col0  len7

// 30A row6  col6  len7

// 32A row7  col5  len3
// 33A row8  col0  len4
// 34A row8  col5  len4
// 36A row8  col10 len5
// 37A row9  col0  len3
// 38A row9  col4  len8
// 40A row10 col3  len5
// 41A row10 col9  len2
// 43A row11 col0  len4
// 46A row11 col9  len6
// 50A row12 col1  len3
// 51A row12 col6  len9
// 52A row13 col1  len3
// 53A row13 col11 len4
// 54A row14 col1  len14

pa(0,0,'OMNISCIENT');
pa(0,11,'LAMP');
pa(1,0,'POORTASTE');
pa(1,10,'BABEL');
pa(2,0,'UNIVERSAL');
pa(2,10,'ISA');
pa(3,0,'SATSUMA');
pa(3,9,'GATSBY');
pa(4,4,'BEDOUINS');
pa(5,0,'CHOSEN');
pa(5,7,'CALCUTTA');
pa(6,0,'RAVEN');
pa(6,6,'WENTAPE');
pa(7,0,'OBER');
pa(7,5,'KAA');
pa(8,0,'WIRE');
pa(8,5,'AUNT');
pa(8,10,'REBEL');
pa(9,0,'NBA');
pa(9,4,'ARGUEFOR');
pa(10,3,'BATHS');
pa(10,9,'OM');
pa(11,0,'LATI');
pa(11,9,'RADLEY');
pa(12,1,'RSL');
pa(12,6,'ARGONAUTS');
pa(13,1,'MAB');
pa(13,11,'NEAT');
pa(14,1,'AROUNDTHEWORLD');

// DOWN — positions from verified auto-numbering (0-indexed row, col):
// 1D  row0 col0  len4
// 2D  row0 col1  len4
// 3D  row0 col2  len4
// 4D  row0 col3  len4
// 5D  row0 col4  len7
// 6D  row0 col5  len6
// 7D  row0 col6  len5
// 8D  row0 col7  len3
// 9D  row0 col8  len3
// 10D row0 col11 len10
// 11D row0 col12 len4
// 12D row0 col13 len2
// 13D row0 col14 len10
// 15D row1 col10 len6
// 19D row3 col9  len4
// 21D row4 col7  len7
// 22D row4 col8  len3
// 23D row5 col0  len5
// 24D row5 col1  len5
// 25D row5 col2  len5
// 26D row5 col3  len4
// 28D row5 col12 len2
// 30D row6 col6  len5
// 32D row7 col5  len4
// 35D row8 col8  len2

// 45D row11 col2 len4
// 47D row11 col11 len4
// 48D row11 col13 len4
// 49D row11 col14 len4
// 51D row12 col6 len3

pd(0,0,'OPUS');
pd(0,1,'MONA');
pd(0,2,'NOIT');
pd(0,3,'IRVS');
pd(0,4,'STEUBEN');
pd(0,5,'CARMEN');
pd(0,6,'ISSAD');
pd(0,7,'ETA');

pd(0,12,'ABAS');
pd(0,13,'ME');

pd(4,8,'UAN');

pd(5,3,'SERE');

pd(11,2,'TSAR');

pd(11,13,'ETAL');
pd(11,14,'YSTD');

// Auto-number cells
var cellNum={}, aStarts={}, dStarts={};
function startsA(r,c){
  if(sol[r][c]==='#') return false;
  return (c===0||sol[r][c-1]==='#') && (c<NC-1&&sol[r][c+1]!=='#');
}
function startsD(r,c){
  if(sol[r][c]==='#') return false;
  return (r===0||sol[r-1][c]==='#') && (r<NR-1&&sol[r+1][c]!=='#');
}
var num=1;
for(r=0;r<NR;r++) for(c=0;c<NC;c++){
  if(sol[r][c]==='#') continue;
  var sa=startsA(r,c), sd=startsD(r,c);
  if(sa||sd){ cellNum[r+','+c]=num; if(sa)aStarts[num]=[r,c]; if(sd)dStarts[num]=[r,c]; num++; }
}

function getA(r,c){var cs=[],sc=c; while(sc>0&&sol[r][sc-1]!=='#')sc--; while(sc<NC&&sol[r][sc]!=='#'){cs.push([r,sc]);sc++;} return cs;}
function getD(r,c){var cs=[],sr=r; while(sr>0&&sol[sr-1][c]!=='#')sr--; while(sr<NR&&sol[sr][c]!=='#'){cs.push([sr,c]);sr++;} return cs;}
function getWord(r,c,dir){return dir==='across'?getA(r,c):getD(r,c);}
function wNum(cells){return cellNum[cells[0][0]+','+cells[0][1]];}

var user=[],pencils=[];
for(r=0;r<NR;r++){user.push([]);pencils.push([]);for(c=0;c<NC;c++){user[r].push('');pencils[r].push(false);}}
var sel=null,dir='across',pencilOn=false;

function buildGrid(){
  var g=document.getElementById('grid'); g.innerHTML='';
  for(r=0;r<NR;r++) for(c=0;c<NC;c++){
    var div=document.createElement('div');
    div.className='cell'+(sol[r][c]==='#'?' blk':'');
    div.id='c'+r+'_'+c;
    if(sol[r][c]!=='#'){
      var n=cellNum[r+','+c];
      if(n){var s=document.createElement('div');s.className='cn';s.textContent=n;div.appendChild(s);}
      var l=document.createElement('div');l.className='cl';l.id='l'+r+'_'+c;div.appendChild(l);
      (function(rr,cc){div.addEventListener('click',function(){onClick(rr,cc);});})(r,c);
    }
    g.appendChild(div);
  }
}

function cel(r,c){return document.getElementById('c'+r+'_'+c);}
function lel(r,c){return document.getElementById('l'+r+'_'+c);}

function onClick(r,c){
  if(sel&&sel[0]===r&&sel[1]===c){
    var other=dir==='across'?'down':'across';
    if(getWord(r,c,other).length>1)dir=other;
  }
  sel=[r,c]; highlight(); showBanner();
}

function highlight(){
  document.querySelectorAll('.cell:not(.blk)').forEach(function(el){el.classList.remove('sel','hl');});
  if(!sel)return;
  var wc=getWord(sel[0],sel[1],dir);
  wc.forEach(function(rc){var el=cel(rc[0],rc[1]);if(el)el.classList.add('hl');});
  var s=cel(sel[0],sel[1]);if(s)s.classList.add('sel');
  var wn=wNum(wc);
  document.querySelectorAll('.ci').forEach(function(el){el.classList.remove('active');});
  var ac=document.querySelector('.ci[data-n="'+wn+'"][data-d="'+dir+'"]');
  if(ac){ac.classList.add('active');ac.scrollIntoView({block:'nearest'});}
}

function showBanner(){
  if(!sel)return;
  var wc=getWord(sel[0],sel[1],dir);
  var wn=wNum(wc);
  var cl=CLUES[dir].find(function(x){return x.n===wn;});
  document.getElementById('bnum').textContent=cl?wn+(dir==='across'?'A':'D')+' ':'';
  document.getElementById('btxt').textContent=cl?cl.c:'';
}

function refreshCell(r,c){
  var l=lel(r,c);if(!l)return;
  l.textContent=user[r][c];
  var el=cel(r,c);if(!el)return;
  el.classList.remove('pencil','rev');
  if(pencils[r][c])el.classList.add('pencil');
}

function updateStatus(){
  var filled=0,total=0;
  for(var r=0;r<NR;r++) for(var c=0;c<NC;c++){
    if(sol[r][c]!=='#'){total++;if(user[r][c])filled++;}
  }
  document.getElementById('sf').textContent='Filled: '+filled;
  document.getElementById('st').textContent='Total: '+total;
  document.getElementById('sp').textContent=Math.round(filled/total*100||0)+'%';
}

document.addEventListener('keydown',function(e){
  if(!sel)return;
  var r=sel[0],c=sel[1];
  if(e.key==='Tab'){e.preventDefault();advWord(e.shiftKey?-1:1);return;}
  if(e.key==='ArrowRight'){e.preventDefault();dir='across';moveTo(r,c+1,0,1);return;}
  if(e.key==='ArrowLeft'){e.preventDefault();dir='across';moveTo(r,c-1,0,-1);return;}
  if(e.key==='ArrowDown'){e.preventDefault();dir='down';moveTo(r+1,c,1,0);return;}
  if(e.key==='ArrowUp'){e.preventDefault();dir='down';moveTo(r-1,c,-1,0);return;}
  if(e.key==='Backspace'||e.key==='Delete'){
    e.preventDefault();
    if(user[r][c]){user[r][c]='';pencils[r][c]=false;refreshCell(r,c);updateStatus();}
    else{var wc=getWord(r,c,dir);var idx=wc.findIndex(function(x){return x[0]===r&&x[1]===c;});if(idx>0){sel=wc[idx-1];highlight();showBanner();}}
    return;
  }
  if(/^[a-zA-Z]$/.test(e.key)){
    e.preventDefault();
    user[r][c]=e.key.toUpperCase();pencils[r][c]=pencilOn;
    refreshCell(r,c);updateStatus();stepFwd();checkDone();
  }
});

function moveTo(r,c,dr,dc){
  while(r>=0&&r<NR&&c>=0&&c<NC){
    if(sol[r][c]!=='#'){sel=[r,c];highlight();showBanner();return;}
    r+=dr;c+=dc;
  }
}
function stepFwd(){
  var r=sel[0],c=sel[1],wc=getWord(r,c,dir);
  var idx=wc.findIndex(function(x){return x[0]===r&&x[1]===c;});
  if(idx<wc.length-1){sel=wc[idx+1];highlight();showBanner();}else advWord(1);
}
function advWord(delta){
  var words=CLUES.across.map(function(x){return{n:x.n,d:'across'};}).concat(CLUES.down.map(function(x){return{n:x.n,d:'down'};}));
  var wc=getWord(sel[0],sel[1],dir),wn=wNum(wc);
  var idx=words.findIndex(function(w){return w.n===wn&&w.d===dir;});
  var next=words[(idx+delta+words.length)%words.length];
  var pos=next.d==='across'?aStarts[next.n]:dStarts[next.n];
  if(pos){sel=pos;dir=next.d;highlight();showBanner();}
}
function togglePencil(){pencilOn=!pencilOn;document.getElementById('pencilBtn').classList.toggle('on',pencilOn);}
function checkWord(){
  if(!sel)return;
  getWord(sel[0],sel[1],dir).forEach(function(rc){
    var el=cel(rc[0],rc[1]);if(!el||!user[rc[0]][rc[1]])return;
    el.classList.remove('ok','bad');
    el.classList.add(user[rc[0]][rc[1]]===sol[rc[0]][rc[1]]?'ok':'bad');
  });
}
function checkAll(){
  for(var r=0;r<NR;r++) for(var c=0;c<NC;c++){
    if(sol[r][c]!=='#'&&user[r][c]){
      var el=cel(r,c);if(!el)continue;
      el.classList.remove('ok','bad');
      el.classList.add(user[r][c]===sol[r][c]?'ok':'bad');
    }
  }
}
function revealWord(){
  if(!sel)return;
  getWord(sel[0],sel[1],dir).forEach(function(rc){
    user[rc[0]][rc[1]]=sol[rc[0]][rc[1]];pencils[rc[0]][rc[1]]=false;
    refreshCell(rc[0],rc[1]);var el=cel(rc[0],rc[1]);if(el)el.classList.add('rev');
  });
  updateStatus();
}
function revealAll(){
  for(var r=0;r<NR;r++) for(var c=0;c<NC;c++){
    if(sol[r][c]!=='#'){user[r][c]=sol[r][c];pencils[r][c]=false;refreshCell(r,c);var el=cel(r,c);if(el)el.classList.add('rev');}
  }
  updateStatus();showModal('Puzzle Revealed','All answers have been filled in.');
}
function clearAll(){
  if(!confirm('Clear all answers?'))return;
  for(var r=0;r<NR;r++) for(var c=0;c<NC;c++){
    user[r][c]='';pencils[r][c]=false;
    var el=cel(r,c);if(el)el.classList.remove('ok','bad','rev','pencil');
    var l=lel(r,c);if(l)l.textContent='';
  }
  updateStatus();
}
function checkDone(){
  for(var r=0;r<NR;r++) for(var c=0;c<NC;c++){if(sol[r][c]!=='#'&&user[r][c]!==sol[r][c])return;}
  setTimeout(function(){showModal('Congratulations!','You solved the crossword!');},350);
}
function showModal(t,b){document.getElementById('mTitle').textContent=t;document.getElementById('mBody').textContent=b;document.getElementById('modalBg').classList.add('on');}
function buildClues(){
  ['across','down'].forEach(function(d){
    var cont=document.getElementById(d==='across'?'aclues':'dclues');cont.innerHTML='';
    CLUES[d].forEach(function(cl){
      var div=document.createElement('div');div.className='ci';div.dataset.n=cl.n;div.dataset.d=d;
      div.innerHTML='<span class="n">'+cl.n+'</span><span class="t">'+cl.c+'</span>';
      (function(cn,cd){div.addEventListener('click',function(){
        var pos=cd==='across'?aStarts[cn]:dStarts[cn];
        if(pos){sel=pos;dir=cd;highlight();showBanner();}
      });})(cl.n,d);
      cont.appendChild(div);
    });
  });
}

buildGrid(); buildClues(); updateStatus();
outer: for(var rr=0;rr<NR;rr++) for(var cc=0;cc<NC;cc++){
  if(sol[rr][cc]!=='#'){sel=[rr,cc];dir='across';highlight();showBanner();break outer;}
}
</script>
